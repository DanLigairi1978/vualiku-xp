name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create env file
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" >> apps/tourist/.env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> apps/tourist/.env.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> apps/tourist/.env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> apps/tourist/.env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> apps/tourist/.env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" >> apps/tourist/.env.local
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" >> apps/tourist/.env.local
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> apps/tourist/.env.local
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> apps/tourist/.env.local
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> apps/tourist/.env.local
          echo "TWILIO_WHATSAPP_NUMBER=${{ secrets.TWILIO_WHATSAPP_NUMBER }}" >> apps/tourist/.env.local
          echo "WINDCAVE_API_KEY=${{ secrets.WINDCAVE_API_KEY }}" >> apps/tourist/.env.local
          echo "WINDCAVE_USERNAME=${{ secrets.WINDCAVE_USERNAME }}" >> apps/tourist/.env.local
          echo "WINDCAVE_CALLBACK_SECRET=${{ secrets.WINDCAVE_CALLBACK_SECRET }}" >> apps/tourist/.env.local
          echo "PAYMENT_PROVIDER=windcave" >> apps/tourist/.env.local
          echo "WINDCAVE_API_URL=https://sec.windcave.com/pxaccess/pxpay.aspx" >> apps/tourist/.env.local
          echo "WINDCAVE_MERCHANT_ID=VualikuDev" >> apps/tourist/.env.local
          echo "WHATSAPP_ENABLED=true" >> apps/tourist/.env.local
          echo "WAIVERS_LIVE=false" >> apps/tourist/.env.local
      - name: Install root dependencies
        run: npm ci
      - name: Install tourist dependencies
        run: npm ci
        working-directory: apps/tourist
      - name: Build
        run: npm run build
        working-directory: apps/tourist
      - uses: FirebaseExtended/action-hosting-deploy@v0